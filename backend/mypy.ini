[mypy]
python_version = 3.11
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = true
ignore_missing_imports = true
exclude = (?x)(venv|\.venv|\.venv311|build|dist|alembic/versions)
plugins = pydantic.mypy
disable_error_code =
    import-untyped,
    import-not-found,
    var-annotated,
    assignment,
    arg-type,
    attr-defined,
    call-arg,
    call-overload,
    index,
    list-item,
    misc,
    no-redef,
    no-any-return,
    operator,
    override,
    return-value,
    union-attr,
    valid-type

[mypy-fastapi.*]
ignore_missing_imports = true

[mypy-passlib.*]
ignore_missing_imports = true

[mypy-jose.*]
ignore_missing_imports = true
