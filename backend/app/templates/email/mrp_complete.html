{% extends "base.html" %}

{# CUI-safe: MRP run identifier + action count only. #}
{% block content %}
<h2>MRP Run Completed</h2>

<div class="alert alert-info">
    <strong>MRP Run {{ run_number }}</strong> completed
    {% if total_actions is not none %}with {{ total_actions }} action(s){% endif %}.
</div>

<p>Log in to Werco to review the MRP results.</p>
{% endblock %}
