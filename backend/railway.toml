[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
watchPatterns = ["**/*"]

# NOTE: dockerfilePath is resolved relative to the upload root. CI deploys with
# `cd backend && railway up . --path-as-root`, so the archive root IS the backend
# dir and the Dockerfile sits at its root — hence the bare "Dockerfile". Leave the
# Railway service "Root Directory" at the repo root / empty so it does not prepend
# a "backend/" prefix and double-up the path (which yields backend/backend/Dockerfile).

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
numReplicas = 1
