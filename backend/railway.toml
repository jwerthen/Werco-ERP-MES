[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["**/*"]

# NOTE: Ensure the backend service's "Root Directory" setting in Railway dashboard
# is set to "backend" (not the repo root) for this config to work correctly.

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
numReplicas = 1
