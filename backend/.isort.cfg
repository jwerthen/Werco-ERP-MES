[settings]
profile = black
line_length = 120
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
# .venv*/* keeps `isort .` out of local virtualenvs (isort's default skip list
# covers ".venv" but not names like ".venv311").
skip_glob = alembic/versions/*,.venv*/*
