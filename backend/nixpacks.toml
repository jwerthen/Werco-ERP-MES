[phases.build]
cmds = []

[start]
# --proxy-headers + --forwarded-allow-ips="*" so uvicorn trusts the proxy's
# X-Forwarded-Proto (Railway's peer is not 127.0.0.1). Without it request.url.scheme
# stays http and trailing-slash 307 redirects downgrade to http:// (browser blocks them).
cmd = "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --proxy-headers --forwarded-allow-ips=*"
