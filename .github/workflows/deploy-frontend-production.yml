name: Deploy Frontend Production

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend-production.yml'
      - '.github/workflows/ci-cd.yml'
  workflow_dispatch:

concurrency:
  group: deploy-frontend-production
  cancel-in-progress: true

jobs:
  deploy-frontend:
    name: Deploy Frontend (Railway Production)
    runs-on: ubuntu-latest
    env:
      # Use explicit environment secrets to avoid stale fallback tokens.
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_FRONTEND_SERVICE: ${{ vars.RAILWAY_FRONTEND_SERVICE }}
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Validate Railway token secret
        run: |
          if [ -z "${RAILWAY_TOKEN}" ]; then
            echo "RAILWAY_TOKEN is empty or missing"
            exit 1
          fi

      - name: Validate Railway project ID secret
        run: |
          if [ -z "${RAILWAY_PROJECT_ID}" ]; then
            echo "RAILWAY_PROJECT_ID is empty or missing"
            exit 1
          fi

      - name: Validate Railway token authentication
        run: |
          # Informational pre-check only. Account/workspace tokens pass `whoami`;
          # project-scoped tokens (what this workflow uses) do NOT, and the current
          # Railway CLI's `railway status` accepts no `--project` flag, so there is
          # no offline way to validate a project token here. The real gate is the
          # `railway up --project ... --service ...` step below, which is what
          # actually authenticates and authorizes against the project — so this
          # step must never hard-fail and abort the deploy.
          if railway whoami > /dev/null 2>&1; then
            echo "Railway account authentication validated via whoami."
          else
            echo "whoami did not validate (expected for a project-scoped RAILWAY_TOKEN)."
            echo "Skipping offline validation; 'railway up --project' below is the real auth check."
          fi

      - name: Deploy frontend service from frontend root
        run: |
          cd frontend
          service_name="${RAILWAY_FRONTEND_SERVICE:-werco-frontend}"
          railway up . --path-as-root --environment production --project "${RAILWAY_PROJECT_ID}" --service "${service_name}"

      - name: Verify deployment no longer serves stale dashboard bundle
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          python - <<'PY'
          import json
          import os
          import time
          import urllib.request
          import sys

          base = (os.environ.get("PRODUCTION_URL") or "").strip().rstrip("/")
          if not base:
            print("PRODUCTION_URL is not configured")
            sys.exit(1)

          stale_main = "/static/js/main.5b05fd32.js"
          last_main = None

          for attempt in range(1, 13):
            try:
              with urllib.request.urlopen(base + "/asset-manifest.json", timeout=20) as resp:
                manifest = json.loads(resp.read().decode())
              main_js = manifest.get("files", {}).get("main.js")
              last_main = main_js
              print(f"Attempt {attempt}: main.js={main_js}")
              if main_js and main_js != stale_main:
                print("Frontend manifest updated.")
                sys.exit(0)
            except Exception as exc:
              print(f"Attempt {attempt}: failed to read manifest: {exc}")

            time.sleep(10)

          print(f"Stale bundle still detected after retries: {last_main}")
          sys.exit(1)
          PY
