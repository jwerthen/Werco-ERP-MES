version: '3.8'

services:
  # Redis (for job queue and caching)
  redis:
    image: redis:7-alpine
    container_name: werco-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: werco-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:?Supabase DATABASE_URL required}
      DATABASE_PROVIDER: supabase
      SUPABASE_DATABASE_URL: ${SUPABASE_DATABASE_URL:-}
      SUPABASE_POSTGRES_URL: ${SUPABASE_POSTGRES_URL:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_PROJECT_REF: ${SUPABASE_PROJECT_REF:-}
      SUPABASE_DB_PASSWORD: ${SUPABASE_DB_PASSWORD:-}
      POSTGRES_URL: ${POSTGRES_URL:-}
      POSTGRES_PRISMA_URL: ${POSTGRES_PRISMA_URL:-}
      POSTGRES_URL_NON_POOLING: ${POSTGRES_URL_NON_POOLING:-}
      POSTGRES_URL_NO_SSL: ${POSTGRES_URL_NO_SSL:-}
      DIRECT_URL: ${DIRECT_URL:-}
      POSTGRES_HOST: ${POSTGRES_HOST:-}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-}
      POSTGRES_DB: ${POSTGRES_DB:-}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
      REFRESH_TOKEN_SECRET_KEY: ${REFRESH_TOKEN_SECRET_KEY:?REFRESH_TOKEN_SECRET_KEY required}
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:8000
      DEBUG: "false"
      ENVIRONMENT: development
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOG_LEVEL: INFO
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@werco.com}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Werco ERP System}
      WEBHOOK_ENCRYPTION_KEY: ${WEBHOOK_ENCRYPTION_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    restart: unless-stopped

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: werco-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      REACT_APP_API_URL: http://localhost:8000/api/v1
    restart: unless-stopped

  # ARQ Worker (background jobs)
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: werco-worker
    environment:
      DATABASE_URL: ${DATABASE_URL:?Supabase DATABASE_URL required}
      DATABASE_PROVIDER: supabase
      SUPABASE_DATABASE_URL: ${SUPABASE_DATABASE_URL:-}
      SUPABASE_POSTGRES_URL: ${SUPABASE_POSTGRES_URL:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_PROJECT_REF: ${SUPABASE_PROJECT_REF:-}
      SUPABASE_DB_PASSWORD: ${SUPABASE_DB_PASSWORD:-}
      POSTGRES_URL: ${POSTGRES_URL:-}
      POSTGRES_PRISMA_URL: ${POSTGRES_PRISMA_URL:-}
      POSTGRES_URL_NON_POOLING: ${POSTGRES_URL_NON_POOLING:-}
      POSTGRES_URL_NO_SSL: ${POSTGRES_URL_NO_SSL:-}
      DIRECT_URL: ${DIRECT_URL:-}
      POSTGRES_HOST: ${POSTGRES_HOST:-}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-}
      POSTGRES_DB: ${POSTGRES_DB:-}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
      REFRESH_TOKEN_SECRET_KEY: ${REFRESH_TOKEN_SECRET_KEY:?REFRESH_TOKEN_SECRET_KEY required}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@werco.com}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Werco ERP System}
      WEBHOOK_ENCRYPTION_KEY: ${WEBHOOK_ENCRYPTION_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: arq app.worker.WorkerSettings

volumes:
  redis_data:
    driver: local
  backend_logs:
    driver: local

networks:
  default:
    name: werco-network
